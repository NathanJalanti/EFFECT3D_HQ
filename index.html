<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Database</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Product Database</h1>
        <p>Recherche et gestion rapide d'articles</p>
      </div>
      <div class="counter" id="itemCounter">0 items</div>
    </header>

    <section class="search-panel">
      <div class="search-row">
        <select id="searchField" aria-label="Critère de recherche"></select>
        <input id="searchInput" type="search" placeholder="Rechercher par nom de produit..." autocomplete="off" />
      </div>

      <div class="actions">
        <button id="addItemBtn" class="primary">Add item</button>
        <button id="editItemBtn" class="secondary" disabled>Edit item</button>
        <button id="deleteItemBtn" class="danger" disabled>Delete item</button>
      </div>
    </section>

    <section class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr id="tableHeader"></tr>
          </thead>
          <tbody id="itemsTable"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty-state">Aucun article enregistré.</div>
    </section>
  </main>

  <dialog id="itemDialog">
    <form id="itemForm" method="dialog">
      <div class="dialog-header">
        <h2 id="dialogTitle">Add item</h2>
        <button type="button" id="closeDialogBtn" class="icon-btn">×</button>
      </div>

      <div id="formGrid" class="form-grid"></div>

      <div class="dialog-actions">
        <button type="button" id="cancelBtn" class="secondary">Cancel</button>
        <button type="submit" class="primary">Done</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
