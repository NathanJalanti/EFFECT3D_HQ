<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Jeu Web</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-wrapper">
    <h1>Mini Jeu Web</h1>
    <p class="instructions">Déplace le carré avec les flèches ou ZQSD. Attrape les pièces jaunes. Évite les blocs rouges.</p>

    <div class="hud">
      <span>Score : <strong id="score">0</strong></span>
      <span>Vies : <strong id="lives">3</strong></span>
      <button id="restartBtn">Recommencer</button>
    </div>

    <canvas id="gameCanvas" width="640" height="400"></canvas>

    <p id="message" class="message">Clique sur le jeu puis joue.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
